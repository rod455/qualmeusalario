<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quanto Ganha! — Onde você trabalha?</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .phone { max-width:390px; min-height:100vh; margin:0 auto; background:#fff; display:flex; flex-direction:column; }

  .topbar { padding:16px 22px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .back-btn { background:none; border:none; font-size:22px; color:#8e8e93; cursor:pointer; line-height:1; padding:2px 4px; }
  .logo-name { font-size:14px; font-weight:700; color:#1a1a1a; }
  .step-indicator { font-size:12px; font-weight:600; color:#aeaeb2; }

  .progress-bar { height:3px; background:#f2f2f7; flex-shrink:0; }
  .progress-fill { height:100%; background:#1D9E75; width:66%; border-radius:0 2px 2px 0; }

  .content { flex:1; padding:28px 24px 16px; display:flex; flex-direction:column; overflow-y:auto; -webkit-overflow-scrolling:touch; }

  .step-badge { display:inline-flex; align-items:center; gap:6px; background:#e8f8f2; color:#0F6E56; font-size:12px; font-weight:700; padding:5px 12px; border-radius:20px; margin-bottom:16px; text-transform:uppercase; letter-spacing:0.5px; }
  h1 { font-size:26px; font-weight:800; color:#1a1a1a; line-height:1.25; letter-spacing:-0.5px; margin-bottom:6px; }
  .subtitle { font-size:15px; color:#8e8e93; line-height:1.4; margin-bottom:28px; }

  .fg { margin-bottom:20px; }
  .fg-label { font-size:12px; font-weight:700; color:#8e8e93; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; display:block; }

  /* CIDADE AC */
  .ac-wrap { position:relative; }
  .ac-wrap input { width:100%; padding:14px 16px; font-size:16px; border:1.5px solid #e5e5ea; border-radius:14px; background:#fff; color:#1a1a1a; font-family:inherit; transition:border-color 0.15s, box-shadow 0.15s; }
  .ac-wrap input:focus { outline:none; border-color:#1D9E75; box-shadow:0 0 0 3px rgba(29,158,117,0.1); }
  .ac-dropdown { position:absolute; top:calc(100%+4px); left:0; right:0; background:#fff; border:1.5px solid #e5e5ea; border-radius:14px; overflow:hidden; max-height:240px; overflow-y:auto; z-index:100; display:none; box-shadow:0 8px 32px rgba(0,0,0,0.1); }
  .ac-dropdown.open { display:block; }
  .ac-section { font-size:10px; font-weight:700; color:#aeaeb2; text-transform:uppercase; letter-spacing:0.7px; padding:9px 16px 4px; background:#f9f9f9; border-bottom:0.5px solid #f2f2f7; position:sticky; top:0; }
  .ac-item { padding:12px 16px; font-size:15px; color:#1a1a1a; cursor:pointer; border-bottom:0.5px solid #f7f7f7; display:flex; justify-content:space-between; align-items:center; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:active { background:#f9f9f9; }
  .ac-item.nomad { background:linear-gradient(90deg,#e8f8f2 0%,#fff 100%); border-left:3px solid #1D9E75; }
  .ac-item.nomad .ac-nm { color:#0F6E56; font-weight:700; }
  .ac-uf { font-size:12px; color:#aeaeb2; }
  .ac-nomad-uf { font-size:12px; color:#1D9E75; font-weight:700; }
  .ac-no { padding:14px 16px; font-size:14px; color:#aeaeb2; text-align:center; }
  .badge-sel { display:inline-flex; align-items:center; gap:8px; background:#e8f8f2; color:#0F6E56; font-size:14px; font-weight:600; padding:8px 14px; border-radius:12px; margin-top:8px; max-width:100%; }
  .badge-sel span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge-sel button { background:none; border:none; color:#0F6E56; cursor:pointer; font-size:16px; line-height:1; flex-shrink:0; }

  /* MODELO */
  .model-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .model-btn {
    border:1.5px solid #e5e5ea; border-radius:14px; padding:14px 8px;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    background:#fff; cursor:pointer; font-family:inherit; transition:all 0.15s;
  }
  .model-btn.active { border-color:#1D9E75; background:#e8f8f2; }
  .model-icon { font-size:22px; }
  .model-label { font-size:13px; font-weight:700; color:#3a3a3c; }
  .model-btn.active .model-label { color:#0F6E56; }
  .model-note { font-size:10px; color:#aeaeb2; font-weight:500; }
  .model-btn.active .model-note { color:#5DCAA5; }

  /* EXP */
  .exp-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .exp-num { font-size:20px; font-weight:800; color:#1D9E75; }
  .exp-sub { font-size:12px; color:#aeaeb2; }
  .exp-track { position:relative; }
  input[type="range"] { width:100%; height:6px; accent-color:#1D9E75; cursor:pointer; border-radius:3px; }
  .exp-markers { display:flex; justify-content:space-between; margin-top:6px; }
  .exp-marker { font-size:10px; color:#aeaeb2; }

  /* CTA */
  .cta-wrap { margin-top:auto; padding-top:24px; }
  .cta-btn { width:100%; padding:16px; background:#1D9E75; color:#fff; border:none; border-radius:14px; font-size:17px; font-weight:800; cursor:pointer; font-family:inherit; letter-spacing:-0.3px; transition:opacity 0.15s, transform 0.1s; }
  .cta-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .cta-btn:not(:disabled):active { opacity:0.88; transform:scale(0.99); }
  .step-hint { text-align:center; font-size:13px; color:#aeaeb2; margin-top:12px; }
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='tela-1a-cargo.html'">‹</button>
    <div class="logo-name">Quanto Ganha!</div>
    <div class="step-indicator">2 de 3</div>
  </div>
  <div class="progress-bar"><div class="progress-fill"></div></div>

  <div class="content">
    <div class="step-badge">📍 Localização</div>
    <h1>Onde e como<br>você trabalha?</h1>
    <p class="subtitle">Cidade e modelo de trabalho impactam até 20% no benchmark de mercado.</p>

    <!-- CIDADE -->
    <div class="fg">
      <label class="fg-label">Cidade</label>
      <div class="ac-wrap">
        <input type="text" id="cidade-input" placeholder="Digite sua cidade ou Nomad..."
          autocomplete="off" oninput="onCidadeInput()" onfocus="onCidadeFocus()" onblur="onCidadeBlur()">
        <div class="ac-dropdown" id="cidade-dd"></div>
      </div>
      <div id="cidade-badge"></div>
    </div>

    <!-- MODELO -->
    <div class="fg" id="modelo-section">
      <label class="fg-label">Modelo de trabalho</label>
      <div class="model-grid">
        <button class="model-btn" id="wm-presencial" onclick="selModel('presencial')">
          <span class="model-icon">🏢</span>
          <span class="model-label">Presencial</span>
          <span class="model-note">referência base</span>
        </button>
        <button class="model-btn active" id="wm-hibrido" onclick="selModel('hibrido')">
          <span class="model-icon">🔄</span>
          <span class="model-label">Híbrido</span>
          <span class="model-note">+5% no mkt</span>
        </button>
        <button class="model-btn" id="wm-remoto" onclick="selModel('remoto')">
          <span class="model-icon">🏠</span>
          <span class="model-label">Remoto</span>
          <span class="model-note">+12% no mkt</span>
        </button>
      </div>
    </div>

    <!-- EXPERIÊNCIA -->
    <div class="fg">
      <label class="fg-label">Tempo de experiência</label>
      <div class="exp-row">
        <div>
          <span class="exp-num" id="exp-num">3 anos</span>
        </div>
        <span class="exp-sub">ajusta o benchmark</span>
      </div>
      <div class="exp-track">
        <input type="range" min="0" max="20" value="3" id="exp-sl" oninput="updateExp()">
        <div class="exp-markers">
          <span class="exp-marker">0</span>
          <span class="exp-marker">5</span>
          <span class="exp-marker">10</span>
          <span class="exp-marker">15</span>
          <span class="exp-marker">20+</span>
        </div>
      </div>
    </div>

    <div class="cta-wrap">
      <button class="cta-btn" id="cta-btn" disabled onclick="goNext()">Continuar →</button>
      <div class="step-hint">Passo 2 de 3 · quase lá!</div>
    </div>
  </div>
</div>

<script>
const CIDADES = [
  { r:"✈️ Trabalho Internacional", nome:"Nomad Digital", uf:"Global", mult:1.0, nomad:true },
  { r:"Capitais", nome:"São Paulo", uf:"SP", mult:1.00 },
  { r:"Capitais", nome:"Rio de Janeiro", uf:"RJ", mult:0.87 },
  { r:"Capitais", nome:"Brasília", uf:"DF", mult:0.96 },
  { r:"Capitais", nome:"Belo Horizonte", uf:"MG", mult:0.81 },
  { r:"Capitais", nome:"Curitiba", uf:"PR", mult:0.83 },
  { r:"Capitais", nome:"Porto Alegre", uf:"RS", mult:0.82 },
  { r:"Capitais", nome:"Fortaleza", uf:"CE", mult:0.70 },
  { r:"Capitais", nome:"Recife", uf:"PE", mult:0.72 },
  { r:"Capitais", nome:"Salvador", uf:"BA", mult:0.71 },
  { r:"Capitais", nome:"Manaus", uf:"AM", mult:0.68 },
  { r:"Capitais", nome:"Belém", uf:"PA", mult:0.66 },
  { r:"Capitais", nome:"Goiânia", uf:"GO", mult:0.74 },
  { r:"Capitais", nome:"Florianópolis", uf:"SC", mult:0.85 },
  { r:"Capitais", nome:"Natal", uf:"RN", mult:0.65 },
  { r:"Capitais", nome:"João Pessoa", uf:"PB", mult:0.64 },
  { r:"Capitais", nome:"Maceió", uf:"AL", mult:0.63 },
  { r:"Capitais", nome:"São Luís", uf:"MA", mult:0.64 },
  { r:"Capitais", nome:"Teresina", uf:"PI", mult:0.61 },
  { r:"Capitais", nome:"Aracaju", uf:"SE", mult:0.63 },
  { r:"Capitais", nome:"Cuiabá", uf:"MT", mult:0.69 },
  { r:"Capitais", nome:"Campo Grande", uf:"MS", mult:0.70 },
  { r:"Capitais", nome:"Porto Velho", uf:"RO", mult:0.65 },
  { r:"Capitais", nome:"Palmas", uf:"TO", mult:0.61 },
  { r:"SP interior", nome:"Campinas", uf:"SP", mult:0.93 },
  { r:"SP interior", nome:"São José dos Campos", uf:"SP", mult:0.87 },
  { r:"SP interior", nome:"Ribeirão Preto", uf:"SP", mult:0.85 },
  { r:"SP interior", nome:"Santos", uf:"SP", mult:0.84 },
  { r:"SP interior", nome:"Sorocaba", uf:"SP", mult:0.82 },
  { r:"SP interior", nome:"Jundiaí", uf:"SP", mult:0.83 },
  { r:"SP interior", nome:"Guarulhos", uf:"SP", mult:0.86 },
  { r:"SP interior", nome:"Osasco", uf:"SP", mult:0.85 },
  { r:"SP interior", nome:"Santo André", uf:"SP", mult:0.88 },
  { r:"SP interior", nome:"Bauru", uf:"SP", mult:0.77 },
  { r:"SP interior", nome:"Piracicaba", uf:"SP", mult:0.80 },
  { r:"MG / RJ", nome:"Uberlândia", uf:"MG", mult:0.74 },
  { r:"MG / RJ", nome:"Juiz de Fora", uf:"MG", mult:0.73 },
  { r:"MG / RJ", nome:"Niterói", uf:"RJ", mult:0.82 },
  { r:"MG / RJ", nome:"Duque de Caxias", uf:"RJ", mult:0.74 },
  { r:"Sul", nome:"Joinville", uf:"SC", mult:0.80 },
  { r:"Sul", nome:"Blumenau", uf:"SC", mult:0.78 },
  { r:"Sul", nome:"Londrina", uf:"PR", mult:0.76 },
  { r:"Sul", nome:"Maringá", uf:"PR", mult:0.77 },
  { r:"Sul", nome:"Ponta Grossa", uf:"PR", mult:0.72 },
  { r:"Sul", nome:"Caxias do Sul", uf:"RS", mult:0.77 },
  { r:"Sul", nome:"Pelotas", uf:"RS", mult:0.70 },
  { r:"Centro-Oeste", nome:"Anápolis", uf:"GO", mult:0.67 },
  { r:"Centro-Oeste", nome:"Dourados", uf:"MS", mult:0.64 },
  { r:"Centro-Oeste", nome:"Rondonópolis", uf:"MT", mult:0.64 },
  { r:"Nordeste interior", nome:"Caruaru", uf:"PE", mult:0.60 },
  { r:"Nordeste interior", nome:"Feira de Santana", uf:"BA", mult:0.62 },
  { r:"Nordeste interior", nome:"Caucaia", uf:"CE", mult:0.62 },
];

let selCidade = null, workModel = 'hibrido', blurT = null;
const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

function onCidadeInput(){ selCidade=null; updateCTA(); renderCidadeDd(document.getElementById('cidade-input').value); }
function onCidadeFocus(){ renderCidadeDd(document.getElementById('cidade-input').value); }
function onCidadeBlur(){ blurT=setTimeout(()=>document.getElementById('cidade-dd').classList.remove('open'),200); }

function renderCidadeDd(q){
  const dd=document.getElementById('cidade-dd'), nq=norm(q.trim());
  dd.innerHTML='';
  const grp={};
  CIDADES.forEach(c => {
    if(!nq || norm(c.nome+' '+c.uf).includes(nq)){
      if(!grp[c.r]) grp[c.r]=[];
      grp[c.r].push(c);
    }
  });
  if(!Object.keys(grp).length){ const d=document.createElement('div'); d.className='ac-no'; d.textContent='Cidade não encontrada'; dd.appendChild(d); }
  else {
    Object.keys(grp).forEach(r => {
      const s=document.createElement('div'); s.className='ac-section'; s.textContent=r; dd.appendChild(s);
      grp[r].forEach(c => {
        const el=document.createElement('div');
        el.className='ac-item'+(c.nomad?' nomad':'');
        el.innerHTML=`<span class="ac-nm">${c.nome}</span><span class="${c.nomad?'ac-nomad-uf':'ac-uf'}">${c.nomad?'✈️ Global':c.uf}</span>`;
        el.onmousedown=()=>{ clearTimeout(blurT); pickCidade(c); };
        dd.appendChild(el);
      });
    });
  }
  dd.classList.add('open');
}

function pickCidade(c){
  selCidade=c;
  document.getElementById('cidade-input').value='';
  document.getElementById('cidade-input').placeholder='Cidade selecionada';
  document.getElementById('cidade-dd').classList.remove('open');
  const label = c.nomad ? 'Nomad Digital ✈️' : `${c.nome}, ${c.uf}`;
  document.getElementById('cidade-badge').innerHTML=`<div class="badge-sel"><span>${label}</span><button onclick="clearCidade()">✕</button></div>`;
  // Nomad: esconde modelo de trabalho, força remoto
  if(c.nomad){
    document.getElementById('modelo-section').style.opacity='0.4';
    document.getElementById('modelo-section').style.pointerEvents='none';
    workModel='remoto';
  } else {
    document.getElementById('modelo-section').style.opacity='1';
    document.getElementById('modelo-section').style.pointerEvents='';
  }
  updateCTA();
}
function clearCidade(){
  selCidade=null;
  document.getElementById('cidade-input').value='';
  document.getElementById('cidade-input').placeholder='Digite sua cidade ou Nomad...';
  document.getElementById('cidade-badge').innerHTML='';
  document.getElementById('modelo-section').style.opacity='1';
  document.getElementById('modelo-section').style.pointerEvents='';
  updateCTA();
}

function selModel(m){
  workModel=m;
  ['presencial','hibrido','remoto'].forEach(k=>document.getElementById('wm-'+k).classList.remove('active'));
  document.getElementById('wm-'+m).classList.add('active');
}

function updateExp(){
  const v=parseInt(document.getElementById('exp-sl').value);
  document.getElementById('exp-num').textContent = v===1 ? '1 ano' : v===0 ? 'Menos de 1 ano' : v+' anos';
}

function updateCTA(){
  const btn=document.getElementById('cta-btn');
  btn.disabled=!selCidade;
  btn.textContent=selCidade ? 'Continuar →' : 'Selecione sua cidade para continuar';
}

function goNext(){
  if(!selCidade) return;
  const d=JSON.parse(localStorage.getItem('qms_data')||'{}');
  d.cidade={ nome:selCidade.nome, uf:selCidade.uf, mult:selCidade.mult, nomad:selCidade.nomad||false };
  d.workModel=workModel;
  d.exp=parseInt(document.getElementById('exp-sl').value);
  localStorage.setItem('qms_data',JSON.stringify(d));
  window.location.href='tela-1c-salario.html';
}
</script>
</body>
</html>
