<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Quanto Ganha! — Criar conta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0B1838; font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff; }

  .screen { max-width:390px; min-height:100vh; margin:0 auto; display:flex; flex-direction:column; }

  /* ── TOPBAR ── */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 16px; }
  .back-btn { background:rgba(255,255,255,0.08); border:none; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; cursor:pointer; }
  .logo-row { display:flex; align-items:center; gap:8px; }
  .logo-icon { width:30px; height:30px; background:#F5A820; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; }
  .logo-name { font-size:15px; font-weight:700; color:rgba(255,255,255,0.8); }
  .topbar-spacer { width:36px; }

  /* ── TABS ── */
  .tab-row { display:flex; margin:4px 24px 28px; background:rgba(255,255,255,0.06); border-radius:14px; padding:4px; }
  .tab-btn { flex:1; padding:11px; border:none; border-radius:11px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; background:transparent; color:rgba(255,255,255,0.4); transition:all 0.15s; }
  .tab-btn.active { background:#0F2048; color:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.4); }

  /* ── FORMS ── */
  .form-wrap { padding:0 24px 32px; display:flex; flex-direction:column; gap:14px; }
  .form-wrap.hidden { display:none; }

  .field-group { display:flex; flex-direction:column; gap:6px; }
  .field-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.6px; }
  .field-wrap {
    display:flex; align-items:stretch;
    border:1.5px solid rgba(255,255,255,0.1); border-radius:13px;
    overflow:hidden; transition:border-color 0.15s, box-shadow 0.15s;
    background:rgba(255,255,255,0.03);
  }
  .field-wrap:focus-within {
    border-color:#17C8E8;
    box-shadow:0 0 0 3px rgba(23,200,232,0.15);
  }
  .field-icon {
    padding:0 14px; display:flex; align-items:center;
    font-size:16px; flex-shrink:0;
    border-right:1px solid rgba(255,255,255,0.06);
  }
  .field-wrap input {
    flex:1; padding:14px 12px; font-size:15px;
    background:transparent; border:none; outline:none;
    color:#fff; font-family:inherit;
  }
  .field-wrap input::placeholder { color:rgba(255,255,255,0.22); }

  /* Olho da senha */
  .eye-btn {
    padding:0 14px; display:flex; align-items:center;
    background:transparent; border:none; cursor:pointer;
    color:rgba(255,255,255,0.3); font-size:17px; flex-shrink:0;
    transition:color 0.15s;
  }
  .eye-btn:hover { color:rgba(255,255,255,0.7); }

  /* ── DIVIDER ── */
  .divider { display:flex; align-items:center; gap:12px; margin:2px 0; }
  .divider-line { flex:1; height:1px; background:rgba(255,255,255,0.07); }
  .divider-text { font-size:12px; color:rgba(255,255,255,0.25); }

  /* ── BOTÕES ── */
  .btn-primary {
    width:100%; padding:15px; background:#F5A820; color:#0B1838;
    border:none; border-radius:13px; font-size:15px; font-weight:800;
    cursor:pointer; font-family:inherit; letter-spacing:-0.2px;
    transition:opacity 0.15s, transform 0.1s;
  }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-primary:not(:disabled):active { opacity:0.88; transform:scale(0.99); }

  .btn-google {
    width:100%; padding:13px; background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(255,255,255,0.1); border-radius:13px;
    font-size:14px; font-weight:600; color:rgba(255,255,255,0.85);
    cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center; gap:10px;
    transition:background 0.15s;
  }
  .btn-google:active { background:rgba(255,255,255,0.09); }

  .btn-link {
    background:none; border:none; font-size:13px;
    color:rgba(255,255,255,0.3); cursor:pointer;
    font-family:inherit; text-align:center; padding:2px 0;
  }
  .btn-link:hover { color:rgba(255,255,255,0.55); }

  /* ── ALERTS ── */
  .alert { padding:12px 14px; border-radius:11px; font-size:13px; line-height:1.5; display:none; }
  .alert.error   { background:rgba(226,75,74,0.1);  border:1px solid rgba(226,75,74,0.2);  color:#ff8a89; }
  .alert.success { background:rgba(29,158,117,0.1); border:1px solid rgba(29,158,117,0.2); color:#F5A820; }

  /* ── ESTADO LOGADO ── */
  .logged-wrap { padding:0 24px; display:none; flex-direction:column; gap:14px; }
  .logged-card { background:#0F2048; border:1px solid rgba(255,255,255,0.07); border-radius:18px; padding:24px; text-align:center; }
  .logged-avatar { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#F5A820,#C47E10); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; color:#fff; margin:0 auto 14px; }
  .logged-name  { font-size:19px; font-weight:800; color:#fff; margin-bottom:4px; letter-spacing:-0.3px; }
  .logged-email { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:16px; }
  .logged-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(29,158,117,0.15); border:1px solid rgba(29,158,117,0.25); border-radius:20px; padding:5px 13px; font-size:12px; color:#F5A820; font-weight:600; margin-bottom:20px; }
  .btn-resultado { width:100%; padding:13px; background:#F5A820; color:#0B1838; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-bottom:8px; }
  .btn-logout { background:none; border:none; font-size:13px; color:rgba(255,255,255,0.3); cursor:pointer; font-family:inherit; }

  :root {
    --color-primary:    #F5A820;
    --color-secondary:  #17C8E8;
    --color-danger:     #E24B4A;
    --color-success:    #1DBE75;
    --color-orange:     #F07030;
    --color-bg:         #0B1838;
    --color-surface:    #0F2048;
    --color-border:     rgba(255,255,255,0.08);
    --color-text:       #FFFFFF;
    --color-text-sec:   rgba(255,255,255,0.45);
    --color-text-faint: rgba(255,255,255,0.25);
    --radius-card:      28px;
    --radius-btn:       28px;
    --radius-tag:       9999px;
    --spacing-screen:   24px;
  }

  /* ── BRAND RESET ── */
  * { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif !important; }

  /* Botão primário CTA — ouro com texto navy */
  .btn-primary, .lock-cta, .cta, .cta-btn,
  button[style*="background:#F5A820"],
  .nav-cta {
    background: #F5A820 !important;
    color: #0B1838 !important;
    font-weight: 800 !important;
    border-radius: 28px !important;
  }

  /* Botão secundário */
  .btn-secondary-brand, .btn-google, .lock-google {
    background: rgba(255,255,255,0.06) !important;
    border: 1.5px solid rgba(255,255,255,0.12) !important;
    color: #fff !important;
    border-radius: 28px !important;
  }

  /* Cards */
  .fake-card, .p-result-card, .vaga-card,
  .locked-card, .p-invite-card {
    background: #0F2048 !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 28px !important;
  }

  /* Tags positivas — verde */
  .rtag.green, .tag-green, .perfil-tag.green,
  .logged-badge, .hero-badge {
    background: rgba(29,190,117,0.15) !important;
    color: #1DBE75 !important;
  }

  /* Tags neutras */
  .rtag.gray, .tag-gray, .perfil-tag.gray {
    background: rgba(255,255,255,0.07) !important;
    color: rgba(255,255,255,0.6) !important;
  }

  /* Bottom nav */
  .bottom-nav { background: #0B1838 !important; border-top: 1px solid rgba(255,255,255,0.08) !important; }
  .nav-item.active .nav-label { color: #F5A820 !important; }
  .nav-item.active .nav-icon-wrap { background: rgba(245,168,32,0.15) !important; }

  /* Barras de progresso */
  .progress-fill, .bfy, .bfy.ab { background: #F5A820 !important; }
  .bfy { background: #E24B4A !important; }
  .bfy.ab { background: #1DBE75 !important; }

  /* Input focus — cyan accent */
  input:focus, .field-wrap:focus-within,
  .ac-wrap:focus-within, .inputWrap:focus-within {
    border-color: #17C8E8 !important;
    box-shadow: 0 0 0 3px rgba(23,200,232,0.12) !important;
  }

  /* Percentual acima — verde, abaixo — vermelho */
  .vpct.above, .above, .green { color: #1DBE75 !important; }
  .vpct.below, .below, .red   { color: #E24B4A !important; }

  /* Logo */
  .logo-img, .logo-img-sm { height: 28px; width: auto; }

  /* Topbar background */
  .topbar { background: #0B1838 !important; }

  /* Chips e badges */
  .chip, .badge, .rtag, .vf-btn.active, .nl-btn.active,
  .model-btn.active, .exp-btn.active {
    background: rgba(245,168,32,0.15) !important;
    border-color: #F5A820 !important;
    color: #F5A820 !important;
  }
</style>
</head>

  <div class="form-wrap" id="form-signup">

    <div class="field-group">

      <div class="field-wrap">

    <div class="field-group">

    </div>

    <div class="field-group">
      <div class="field-label">Senha</div>

    <div class="alert error"   id="su-error"></div>

    <button class="btn-primary" id="su-btn" onclick="signUp()">Criar conta grátis →</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">ou entre com</div>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
      Google
    </button>

    <button class="btn-link" onclick="switchTab('login')">Já tenho conta — Entrar</button>
  </div>

  <!-- ══ FORM LOGIN ══ -->
  <div class="form-wrap hidden" id="form-login">

    <div class="field-group">
      <div class="field-label">E-mail</div>
      <div class="field-wrap">
        <div class="field-icon">@</div>
        <input type="email" id="li-email" placeholder="seu@email.com"
          autocomplete="email" inputmode="email">
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Senha</div>
      <div class="field-wrap">
        <div class="field-icon">🔒</div>
        <input type="password" id="li-pass" placeholder="Sua senha"
          autocomplete="current-password">
        <button class="eye-btn" onclick="toggleEye('li-pass','eye3')" type="button">
          <span id="eye3">👁</span>
        </button>
      </div>
    </div>

    <div class="alert error"   id="li-error"></div>
    <div class="alert success" id="li-success"></div>

    <button class="btn-primary" id="li-btn" onclick="signIn()">Entrar →</button>

    <button class="btn-link" onclick="forgotPassword()">Esqueci minha senha</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">ou entre com</div>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
      Google
    </button>

    <button class="btn-link" onclick="switchTab('signup')">Não tenho conta — Criar</button>
  </div>

  <!-- ══ ESTADO LOGADO ══ -->
  <div class="logged-wrap" id="form-logged">
    <div class="logged-card">
      <div class="logged-avatar" id="logged-avatar">?</div>
      <div class="logged-name"   id="logged-name">Usuário</div>
      <div class="logged-email"  id="logged-email"></div>
      <div class="logged-badge">✅ Conta ativa</div>
      <button class="btn-resultado" onclick="window.location.href='tela-3-resultado.html'">
        Ver meu resultado →
      </button>
      <button class="btn-logout" onclick="signOut()">Sair da conta</button>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════
   SUPABASE
════════════════════════════════════════ */
const { createClient } = supabase;
const sb = createClient(
  'https://mnqqmxizchcxwptnhsfm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ucXFteGl6Y2hjeHdwdG5oc2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTEyMTgsImV4cCI6MjA4OTEyNzIxOH0.G8hnal04gsQVhJd9vorHHKYsnYFtlz3ALtSks1By-rQ'
);

/* ── Verifica sessão ao carregar ── */
window.addEventListener('load', async () => {
  const { data } = await sb.auth.getSession();
  if(data?.session?.user) showLoggedState(data.session.user);

  const p = new URLSearchParams(window.location.search);
  if(p.get('tab') === 'login') switchTab('login');
});

/* ════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════ */
function switchTab(t){
  ['signup','login'].forEach(k => {
    document.getElementById('tab-'+k).classList.toggle('active', k===t);
    document.getElementById('form-'+k).classList.toggle('hidden', k!==t);
  });
}

/* Olho — mostrar/ocultar senha */
function toggleEye(inputId, eyeId){
  const inp = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  if(inp.type === 'password'){
    inp.type = 'text';
    eye.textContent = '🙈';
  } else {
    inp.type = 'password';
    eye.textContent = '👁';
  }
}

function setLoading(form, loading){
  const id  = form==='signup' ? 'su-btn' : 'li-btn';
  const btn = document.getElementById(id);
  const lbl = form==='signup' ? 'Criar conta grátis →' : 'Entrar →';
  btn.disabled    = loading;
  btn.textContent = loading ? 'Aguarde...' : lbl;
}

function showAlert(form, type, msg){
  const err = document.getElementById(form+'-error');
  const ok  = document.getElementById(form+'-success');
  err.style.display = 'none';
  ok.style.display  = 'none';
  if(!type || !msg) return;
  if(type==='error')  { err.textContent=msg; err.style.display='block'; }
  if(type==='success'){ ok.textContent=msg;  ok.style.display='block';  }
}

/* ════════════════════════════════════════
   SALVAR DADOS DO ONBOARDING
════════════════════════════════════════ */
async function saveOnboardingData(userId){
  const rawResult = localStorage.getItem('qms_result');
  if(rawResult && userId){
    const R = JSON.parse(rawResult);
    try {
      await sb.from('salary_analyses').upsert({
        user_id:      userId,
        cargo:        R.cargo,
        area:         R.area || null,
        cidade:       R.cidade?.nome,
        uf:           R.cidade?.uf,
        is_nomad:     R.isNomad || false,
        work_model:   R.workModel,
        exp_years:    R.exp,
        salary_fixo:  R.my?.fixo,
        salary_total: R.my?.total,
        market_total: R.mkt?.total,
        diff_pct:     R.diff,
        diff_mes:     R.diffMes,
        diff_ano:     R.diffAno,
        created_at:   new Date().toISOString(),
      }, { onConflict: 'user_id,created_at' });
    } catch(e){ console.warn('saveAnalysis:', e); }
  }

  const rawData = localStorage.getItem('qms_data');
  if(rawData && userId){
    const D = JSON.parse(rawData);
    try {
      await sb.from('onboarding_data').upsert({
        user_id:     userId,
        cargo:       D.cargo,
        area:        D.area || null,
        cidade:      D.cidade?.nome,
        uf:          D.cidade?.uf,
        work_model:  D.workModel,
        exp_years:   D.exp,
        salary_fixo: D.salario,
        extra_com:   D.extras?.com || 0,
        extra_plr:   D.extras?.plr || 0,
        extra_bon:   D.extras?.bon || 0,
        extra_vr:    D.extras?.vr  || 0,
        extra_out:   D.extras?.out || 0,
        updated_at:  new Date().toISOString(),
      }, { onConflict: 'user_id' });
    } catch(e){ console.warn('saveOnboarding:', e); }
  }
}

function showLoggedState(user){
  document.getElementById('form-signup').classList.add('hidden');
  document.getElementById('form-login').classList.add('hidden');
  document.querySelector('.tab-row').style.display = 'none';

  const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Usuário';
  const initials = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  document.getElementById('logged-avatar').textContent = initials;
  document.getElementById('logged-name').textContent   = name;
  document.getElementById('logged-email').textContent  = user.email || '';

  const w = document.getElementById('form-logged');
  w.style.display = 'flex';

  localStorage.setItem('qms_session', JSON.stringify({
    user: { email: user.email, user_metadata: user.user_metadata }
  }));
  saveOnboardingData(user.id);
}

/* ════════════════════════════════════════
   AUTH
════════════════════════════════════════ */
async function signUp(){
  const name  = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-pass').value;
  const pass2 = document.getElementById('su-pass2').value;
  showAlert('su','','');

  if(!name)           return showAlert('su','error','Informe seu nome.');
  if(!email)          return showAlert('su','error','Informe um e-mail válido.');
  if(pass.length < 6) return showAlert('su','error','Senha com mínimo 6 caracteres.');
  if(pass !== pass2)  return showAlert('su','error','As senhas não coincidem.');

  setLoading('signup', true);
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name } }
  });
  setLoading('signup', false);

  if(error){
    const msgs = {
      'User already registered':  'E-mail já cadastrado. Faça login.',
      'Invalid email':            'E-mail inválido.',
      'Password should be at least 6 characters': 'Senha muito curta.',
    };
    return showAlert('su','error', msgs[error.message] || error.message);
  }

  if(data.user){
    showLoggedState(data.user);
    showAlert('su','success','✅ Conta criada com sucesso!');
  }
}

async function signIn(){
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  showAlert('li','','');

  if(!email || !pass) return showAlert('li','error','Preencha e-mail e senha.');

  setLoading('login', true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('login', false);

  if(error){
    const msgs = {
      'Invalid login credentials': 'E-mail ou senha incorretos.',
      'Email not confirmed':       'Confirme seu e-mail antes de entrar.',
    };
    return showAlert('li','error', msgs[error.message] || error.message);
  }
  showLoggedState(data.user);
}

async function signInGoogle(){
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if(error) showAlert('su','error','Erro Google: ' + error.message);
}

async function forgotPassword(){
  const email = document.getElementById('li-email').value.trim();
  if(!email) return showAlert('li','error','Informe seu e-mail acima.');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/tela-cadastro.html'
  });
  if(error) return showAlert('li','error','Erro: ' + error.message);
  showAlert('li','success','E-mail de redefinição enviado! Verifique sua caixa.');
}

async function signOut(){
  await sb.auth.signOut();
  localStorage.removeItem('qms_session');
  document.getElementById('form-logged').style.display = 'none';
  document.querySelector('.tab-row').style.display = 'flex';
  switchTab('signup');
}
</script>
</body>
</html>
